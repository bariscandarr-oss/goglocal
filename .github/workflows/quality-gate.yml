name: quality-gate

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run quality gate against live API
        env:
          QUALITY_BASE_URL: ${{ vars.QUALITY_BASE_URL }}
          QUALITY_MIN_PASS_RATE: ${{ vars.QUALITY_MIN_PASS_RATE }}
        run: |
          BASE_URL="${QUALITY_BASE_URL:-https://goglocal.app}"
          MIN_PASS="${QUALITY_MIN_PASS_RATE:-85}"
          python -m app.eval_quality \
            --base-url "$BASE_URL" \
            --dataset data/test_queries.json \
            --min-pass-rate "$MIN_PASS"

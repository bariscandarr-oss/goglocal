services:
  - type: web
    name: goglocal-web
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: AUTO_INIT_DB
        value: "false"
      - key: AUTO_SEED_JSON
        value: "false"
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: GOOGLE_SEARCH_CENTER
        value: "41.0422,29.0083"
      - key: GOOGLE_SEARCH_RADIUS_METERS
        value: "2500"
      - key: GOOGLE_INGEST_AREAS
        value: "cekmekoy,kadikoy,besiktas,beyoglu,sisli,uskudar"
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false

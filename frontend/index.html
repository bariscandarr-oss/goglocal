<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GoGlocal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="/frontend/styles.css" />
  </head>
  <body>
    <main class="layout">
      <section class="panel hero">
        <h1>GoGlocal</h1>
        <p>Google Maps yerine ihtiyaca gore konusan yerel oneriler.</p>
        <div class="chips" id="chips"></div>
        <form id="searchForm" class="search-form">
          <label for="userId">Kullanici ID</label>
          <input id="userId" placeholder="ornek: baris" />
          <label for="profileTags">Profil etiketleri (virgulle)</label>
          <input id="profileTags" placeholder="sessiz,wifi,vegan" />
          <label for="budgetLevel">Butce seviyesi (1-4)</label>
          <input id="budgetLevel" type="number" min="1" max="4" placeholder="2" />
          <label for="homeArea">Yasadigin bolge (or. kadikoy)</label>
          <input id="homeArea" placeholder="kadikoy" />
          <button type="button" id="saveProfileBtn" class="secondary">Profili Kaydet</button>
          <label for="query">Ne ariyorsun?</label>
          <textarea id="query" placeholder="Ornek: Kadikoy civarinda sessiz, vegan, ders calisabilecegim acik bir yer" required></textarea>
          <button type="submit" id="searchBtn">AI ile Bul</button>
        </form>
      </section>

      <section class="panel map-panel">
        <div id="map"></div>
      </section>

      <section class="panel results-panel">
        <header>
          <h2>Sonuclar</h2>
          <small id="meta"></small>
        </header>
        <div id="results" class="results"></div>
      </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="/frontend/app.js"></script>
  </body>
</html>
